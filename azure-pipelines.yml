trigger:
  branches:
    include:
      - main
      - master

pool:
  vmImage: 'ubuntu-latest'

variables:
  NODE_VERSION: '20.x'

steps:
  - task: NodeTool@0
    inputs:
      versionSpec: '$(NODE_VERSION)'
    displayName: 'Use Node.js $(NODE_VERSION)'

  - script: |
      node -v
      npm -v
    displayName: 'Check Node/NPM versions'

  - script: |
      npm ci
    displayName: 'Install dependencies'

  - script: |
      npm test --if-present
    displayName: 'Run tests (if present)'

  - script: |
      npm run build --if-present
    displayName: 'Build (if present)'

  - script: |
      npm run lint --if-present
    displayName: 'Lint (if present)'